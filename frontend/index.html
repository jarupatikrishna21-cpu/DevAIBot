<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiGravity - DevOps Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-dark">
    <div class="app-layout">
        <!-- Mobile Nav Overlay -->
        <div id="mobile-overlay" class="mobile-overlay" aria-hidden="true"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <span class="status-dot tooltip" data-tooltip="API Online"></span>
                    <h1>AntiGravity</h1>
                </div>
                <button id="close-sidebar" class="mobile-only icon-btn" aria-label="Close sidebar">✕</button>
            </div>
            
            <nav class="topic-nav">
                <h3 class="nav-label">CONTEXT TOPICS</h3>
                <ul id="topic-list">
                    <li><button class="topic-btn active" data-topic="General">General</button></li>
                    <li><button class="topic-btn" data-topic="Deployment">Deployment</button></li>
                    <li><button class="topic-btn" data-topic="Docker/K8s">Docker/K8s</button></li>
                    <li><button class="topic-btn" data-topic="CI/CD">CI/CD</button></li>
                    <li><button class="topic-btn" data-topic="Monitoring">Monitoring</button></li>
                    <li><button class="topic-btn" data-topic="Terraform/IaC">Terraform/IaC</button></li>
                    <li><button class="topic-btn" data-topic="Security">Security</button></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="session-stats">
                    <p>Stats (Session)</p>
                    <div class="stat-row"><span>Messages</span><span id="stat-msgs">0</span></div>
                    <div class="stat-row"><span>Resolved</span><span id="stat-resolved">0</span></div>
                    <div class="stat-row"><span>Avg Time</span><span id="stat-time">0ms</span></div>
                </div>
                <button id="clear-chat" class="btn-secondary" aria-label="Clear chat history">Clear Chat</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="open-sidebar" class="mobile-only icon-btn" aria-label="Open sidebar">☰</button>
                    <div>
                        <h2 id="current-topic-title">General Discussion</h2>
                        <p class="subtitle">AI DevOps Engineering Support</p>
                    </div>
                </div>
                <div class="header-right">
                    <button id="export-chat" class="icon-btn tooltip" data-tooltip="Export .txt" aria-label="Export chat">📥</button>
                    <button id="theme-toggle" class="icon-btn tooltip" data-tooltip="Toggle Theme" aria-label="Toggle theme">🌓</button>
                </div>
            </header>

            <div id="chat-container" class="chat-container">
                <div id="welcome-screen" class="welcome-screen">
                    <h2>How can I help you scale today?</h2>
                    <div class="welcome-cards">
                        <button class="welcome-card" data-fill="How do I set up a basic GitHub Actions pipeline for Node.js?">
                            <h4>CI/CD Pipeline</h4>
                            <p>Setup GitHub Actions</p>
                        </button>
                        <button class="welcome-card" data-fill="Create a multi-stage Dockerfile for a React application.">
                            <h4>Containerization</h4>
                            <p>Multi-stage Dockerfile</p>
                        </button>
                        <button class="welcome-card" data-fill="What are the best practices for securing an AWS S3 bucket?">
                            <h4>Cloud Security</h4>
                            <p>Lock down AWS S3</p>
                        </button>
                        <button class="welcome-card" data-fill="Write a Terraform script to provision an EC2 instance.">
                            <h4>Infrastructure</h4>
                            <p>Terraform EC2 Script</p>
                        </button>
                    </div>
                </div>
                <div id="messages-area" class="messages-area"></div>
            </div>

            <div class="input-container">
                <div id="suggestions-bar" class="suggestions-bar"></div>
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Ask a DevOps question... (Shift+Enter for new line)" rows="1" maxlength="2000" aria-label="Chat input"></textarea>
                    <button id="send-btn" class="send-btn" aria-label="Send message">
                        <span class="send-icon">➤</span>
                        <span class="spinner hidden"></span>
                    </button>
                </div>
                <div class="input-footer">
                    <span id="char-count">0 / 2000</span>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
